app = "credora-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  NOTARIZATION_BIND_ADDR = "0.0.0.0:8080"
  NOTARIZATION_ADMIN_LOCAL_ONLY = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
