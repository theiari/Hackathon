name: Build Backend and Push to ACR

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: caf1f2f8f77eacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: Credora/src/notarization-service/
          file: Credora/src/notarization-service/Dockerfile
          push: true
          tags: caf1f2f8f77eacr.azurecr.io/hackathon-backend:latest
